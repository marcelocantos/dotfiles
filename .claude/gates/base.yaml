# Base gates — apply to all projects unless overridden.
# Projects declare their profile in CLAUDE.md:
#   ## Gates
#   profile: <name>
# The agent reads base.yaml + <name>.yaml and merges them.

pre-merge:
  - tests-exist:
      type: automated
      check: |
        Changed code has tests that exercise the user-facing flow
        the change enables, not just the internals of the change.
        A test that imports the new function or reaches the new
        branch is not sufficient if it does not also verify the
        downstream behaviour the change is supposed to unlock.
        Example failure mode: a new readiness-detection primitive
        is covered by a test that spawns the subject and calls
        the primitive, but no test actually sends a prompt through
        the primitive and verifies a response arrives. Three
        independent bugs shipped this way in claudia v0.4.0 under
        a green gate. Prefer one end-to-end test that drives the
        user-facing flow over several isolated tests of the
        individual parts.
  - ci-green:
      type: automated
      check: "CI passes on the PR branch."
  - pr-workflow:
      type: routed
      skill: push
      check: "Changes go through a PR — never push directly to master."

pre-release:
  - changelog-reviewed:
      type: automated
      check: "Release notes were displayed in the transcript."
